<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>md-site</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Pages</h2>
      <button class="sidebar-toggle" id="sidebar-toggle" title="Collapse sidebar">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="11" y1="3" x2="6" y2="8"/>
          <line x1="6" y1="8" x2="11" y2="13"/>
        </svg>
      </button>
    </div>
    <div class="sidebar-nav">
      <ul id="sidebar-list"></ul>
    </div>
    <div class="sidebar-footer" id="sidebar-footer"></div>
  </nav>

  <button class="sidebar-toggle-floating" id="sidebar-toggle-floating" title="Expand sidebar">
    <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <line x1="5" y1="3" x2="10" y2="8"/>
      <line x1="10" y1="8" x2="5" y2="13"/>
    </svg>
  </button>

  <main class="md-content" id="md-content">
    <p class="loading">Loading...</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
